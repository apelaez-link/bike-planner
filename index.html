<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BikePlanner">
<meta name="theme-color" content="#08090D">
<meta name="description" content="Planificador de rutas AMBici + Bicing en tiempo real">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>Bike Planner</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08090D;--s1:#0F1219;--s2:#161C28;--s3:#1C2535;
  --border:#212D42;--border2:#2A3A55;
  --text:#E8EDF5;--sub:#8899B4;--dim:#4A5A72;
  --green:#1DEBA0;--blue:#4D9CFF;--purple:#9B7FFF;--amber:#F0A040;--red:#FF5252;
  --mono:'DM Mono',monospace;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;font-family:'Syne',sans-serif;background:var(--bg);color:var(--text)}

/* ── LAYOUT: map bottom, panel slides up ── */
#app{position:relative;width:100%;height:100%}
#map{position:absolute;inset:0;z-index:1}
#panel{
  position:absolute;bottom:0;left:0;right:0;z-index:10;
  background:var(--s1);
  border-radius:20px 20px 0 0;
  border-top:1px solid var(--border);
  box-shadow:0 -8px 40px #00000060;
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  padding-bottom:var(--safe-bot);
  height:92vh;
  display:flex;flex-direction:column;
}
#panel.peek{transform:translateY(calc(100% - 80px))}
#panel.half{transform:translateY(44%)}
#panel.full{transform:translateY(0)}

/* drag handle */
#drag-handle{
  width:36px;height:4px;background:var(--border2);border-radius:2px;
  margin:10px auto 0;flex-shrink:0;cursor:grab
}
#panel.full #drag-handle{margin-top:calc(var(--safe-top) + 10px)}

/* panel header */
#panel-header{
  padding:.75rem 1.25rem .5rem;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between
}
#panel-title{font-size:.9rem;font-weight:700;letter-spacing:-.01em}
#panel-title .a{color:var(--green)}
#panel-title .b{color:var(--blue)}
#status-pill{
  display:flex;align-items:center;gap:.4rem;
  background:var(--s2);border:1px solid var(--border);
  border-radius:20px;padding:.25rem .65rem;
  font-family:var(--mono);font-size:.65rem;color:var(--sub)
}
#status-dot{width:6px;height:6px;border-radius:50%;background:var(--dim);flex-shrink:0}
#status-dot.loading{background:var(--amber);animation:blink 1s infinite}
#status-dot.ok{background:var(--green)}
#status-dot.monitoring{background:var(--blue);animation:blink 1.5s infinite}
#status-dot.error{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* panel body */
#panel-body{flex:1;min-height:0;overflow-y:auto;padding:0 1.25rem .5rem;-webkit-overflow-scrolling:touch}

/* inputs */
.input-row{
  display:flex;align-items:center;gap:.6rem;
  background:var(--s2);border:1px solid var(--border);
  border-radius:12px;padding:.55rem .85rem;margin-bottom:.5rem;
  transition:border-color .15s
}
.input-row:focus-within{border-color:var(--green)}
.input-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.input-row input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:'Syne',sans-serif;font-size:.88rem;color:var(--text);
  min-width:0
}
.input-row input::placeholder{color:var(--dim)}
.input-row .clear-btn{
  background:none;border:none;color:var(--dim);cursor:pointer;
  font-size:1rem;padding:0;line-height:1;flex-shrink:0
}
.input-gps{
  background:none;border:none;color:var(--green);cursor:pointer;
  font-size:1rem;padding:0;line-height:1;flex-shrink:0
}

/* plan button */
#plan-btn{
  width:100%;margin:.25rem 0 .75rem;padding:.75rem;
  background:var(--green);color:#08090D;
  border:none;border-radius:12px;
  font-family:'Syne',sans-serif;font-size:.92rem;font-weight:700;
  cursor:pointer;transition:filter .15s;letter-spacing:.01em
}
#plan-btn:active{filter:brightness(.9)}
#plan-btn:disabled{background:var(--s3);color:var(--dim);cursor:not-allowed}

/* alerts */
.alert{
  border-radius:10px;padding:.6rem .8rem;
  font-size:.78rem;line-height:1.45;
  display:flex;gap:.5rem;align-items:flex-start;margin-bottom:.4rem
}
.al-ok{background:#1DEBA010;border:1px solid #1DEBA025;color:#7FFFD4}
.al-warn{background:#F0A04010;border:1px solid #F0A04025;color:#FCD080}
.al-danger{background:#FF525210;border:1px solid #FF525225;color:#FFA0A0}
.al-icon{flex-shrink:0}

/* route cards */
.route-card{
  background:var(--s2);border:1.5px solid var(--border);
  border-radius:14px;padding:.85rem;margin-bottom:.6rem;cursor:pointer;
  transition:border-color .15s
}
.route-card.active{border-color:var(--green)}
.rc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.65rem}
.rc-label{font-size:.82rem;font-weight:700}
.rc-badge{
  font-family:var(--mono);font-size:.64rem;font-weight:500;
  padding:.2rem .5rem;border-radius:5px
}
.badge-high{background:#1DEBA018;color:var(--green);border:1px solid #1DEBA030}
.badge-med{background:#F0A04018;color:var(--amber);border:1px solid #F0A04030}
.badge-low{background:#FF525218;color:var(--red);border:1px solid #FF525230}

/* legs */
.leg{display:flex;align-items:flex-start;gap:.6rem;margin-bottom:.35rem}
.leg-icon{font-size:.85rem;flex-shrink:0;margin-top:.05rem}
.leg-text{font-size:.75rem;color:var(--sub);line-height:1.4}
.leg-text strong{color:var(--text)}
.leg-text .num-ok{color:var(--green);font-family:var(--mono);font-weight:500}
.leg-text .num-warn{color:var(--amber);font-family:var(--mono);font-weight:500}
.leg-text .num-bad{color:var(--red);font-family:var(--mono);font-weight:500}

.rc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:.6rem;padding-top:.6rem;border-top:1px solid var(--border)}
.rc-dist{font-family:var(--mono);font-size:.7rem;color:var(--dim)}
.rc-time{font-family:var(--mono);font-size:.7rem;color:var(--sub)}
#more-routes-btn{
  width:100%;margin-top:.2rem;margin-bottom:.6rem;padding:.6rem;
  background:transparent;border:1px solid var(--border2);border-radius:12px;
  color:var(--sub);font-family:'Syne',sans-serif;font-size:.82rem;font-weight:600;
  cursor:pointer;transition:border-color .15s,color .15s
}
#more-routes-btn:active{border-color:var(--green);color:var(--green)}
.start-btn{
  background:var(--s3);border:1px solid var(--border2);
  color:var(--text);border-radius:8px;padding:.4rem .85rem;
  font-family:'Syne',sans-serif;font-size:.76rem;font-weight:600;cursor:pointer
}
.start-btn:active{filter:brightness(1.2)}

/* monitor */
#monitor-bar{
  background:var(--s2);border:1px solid var(--border);
  border-radius:12px;padding:.7rem .9rem;margin-bottom:.5rem
}
#monitor-bar h4{font-size:.7rem;color:var(--sub);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.5rem;font-weight:600}
#monitor-log{max-height:80px;overflow-y:auto}
.log-line{font-family:var(--mono);font-size:.68rem;color:var(--sub);padding:.1rem 0;line-height:1.4}
.log-ts{color:var(--dim);margin-right:.4rem}
#stop-btn{
  margin-top:.5rem;background:none;border:1px solid var(--border2);
  color:var(--sub);border-radius:8px;padding:.35rem .8rem;
  font-family:'Syne',sans-serif;font-size:.74rem;cursor:pointer
}

/* empty */
.empty{text-align:center;padding:1.5rem 0;color:var(--dim)}
.empty .e-icon{font-size:2rem;margin-bottom:.4rem}
.empty p{font-size:.78rem;line-height:1.5}

/* map attribution */
.leaflet-control-attribution{font-size:.55rem!important;background:#08090Da0!important;color:#4A5A72!important}
.leaflet-control-attribution a{color:#4A5A72!important}
.leaflet-tooltip{
  background:var(--s2)!important;border:1px solid var(--border)!important;
  color:var(--text)!important;font-family:'Syne',sans-serif!important;
  font-size:.72rem!important;border-radius:8px!important;
  box-shadow:0 4px 16px #00000060!important;padding:.3rem .6rem!important
}

/* scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* tap feedback */
.route-card:active{transform:scale(.985)}

/* user location dot */
.user-dot{
  width:16px;height:16px;background:#4D9CFF;border-radius:50%;
  border:2.5px solid #fff;box-shadow:0 2px 8px #0007;
  animation:userPulse 2s ease-out infinite;
}
@keyframes userPulse{
  0%  {box-shadow:0 0 0 0 #4D9CFF55,0 2px 8px #0007}
  70% {box-shadow:0 0 0 12px #4D9CFF00,0 2px 8px #0007}
  100%{box-shadow:0 0 0 0 #4D9CFF00,0 2px 8px #0007}
}

/* phase progress bar */
#phase-bar{
  display:flex;gap:4px;margin-bottom:.5rem;
}
.phase-seg{
  flex:1;height:3px;border-radius:2px;background:var(--border2);transition:background .4s;
}
.phase-seg.done{background:var(--green)}
.phase-seg.active{background:var(--amber);animation:blink 1s infinite}

/* floating map controls */
#map-controls{
  position:absolute;right:12px;top:calc(var(--safe-top) + 14px);
  z-index:9;display:flex;flex-direction:column;gap:8px;
}
.map-btn{
  width:42px;height:42px;
  background:var(--s1);border:1px solid var(--border2);border-radius:11px;
  color:var(--text);font-size:1.15rem;line-height:1;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;box-shadow:0 2px 12px #00000070;
  -webkit-tap-highlight-color:transparent;transition:background .12s;
}
.map-btn:active{background:var(--s2)}
#mc-route{display:none}
</style>
</head>
<body>
<div id="app">
  <div id="map"></div>

  <div id="map-controls">
    <button class="map-btn" id="mc-locate" title="Mi ubicación">📍</button>
    <button class="map-btn" id="mc-route"  title="Centrar ruta">🎯</button>
  </div>

  <div id="panel" class="half">
    <div id="drag-handle"></div>

    <div id="panel-header">
      <div id="panel-title"><span class="a">AMBici</span> + <span class="b">Bicing</span></div>
      <div id="status-pill">
        <div id="status-dot" class="loading"></div>
        <span id="status-text">Cargando…</span>
      </div>
    </div>

    <div id="panel-body">
      <!-- Inputs -->
      <div class="input-row">
        <div class="input-dot" style="background:var(--green)"></div>
        <input id="origin-input" type="text" placeholder="Origen (Enter para buscar)">
        <button class="input-gps" id="gps-btn" title="Usar mi ubicación">📍</button>
        <button class="clear-btn" id="clear-origin" style="display:none">×</button>
      </div>
      <div class="input-row">
        <div class="input-dot" style="background:var(--blue)"></div>
        <input id="dest-input" type="text" placeholder="Destino (Enter para buscar)">
        <button class="clear-btn" id="clear-dest" style="display:none">×</button>
      </div>

      <button id="plan-btn" disabled>Calcular rutas</button>

      <div id="alerts-box"></div>
      <div id="monitor-bar" style="display:none">
        <h4>Monitor en ruta</h4>
        <div id="phase-bar">
          <div class="phase-seg active" data-ph="0"></div>
          <div class="phase-seg" data-ph="1"></div>
          <div class="phase-seg" data-ph="2"></div>
          <div class="phase-seg" data-ph="3"></div>
          <div class="phase-seg" data-ph="4"></div>
        </div>
        <div id="monitor-log"></div>
        <button id="stop-btn">⏹ Detener</button>
      </div>
      <div id="routes-box">
        <div class="empty"><div class="e-icon">🚴</div><p>Introduce origen y destino<br>para calcular rutas</p></div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── FEEDS ─────────────────────────────────────────────────────────────────────
const FEEDS = {
  ambici_info:   "https://gbfs.nextbike.net/maps/gbfs/v2/nextbike_bs/en/station_information.json",
  ambici_status: "https://gbfs.nextbike.net/maps/gbfs/v2/nextbike_bs/en/station_status.json",
  // CityBikes: CORS abierto, datos en tiempo real, sin API key
  bicing: "https://api.citybik.es/v2/networks/bicing",
};

async function fetchJSON(url) {
  const r = await fetch(url, { signal: AbortSignal.timeout(10000) });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ── OpenRouteService ──────────────────────────────────────────────────────────
const ORS_KEY = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjU3ZmJmMmUzZTQ5NzRiZTg4MTUyOWQ5ZDAzZWRjZmQwIiwiaCI6Im11cm11cjY0In0=";
const ORS_BASE = "https://api.openrouteservice.org/v2/directions";

// Returns [[lat,lon],...] for Leaflet, or null on failure
async function fetchRoute(profile, fromLL, toLL) {
  try {
    const body = {
      coordinates: [
        [fromLL.lon ?? fromLL.lng, fromLL.lat],
        [toLL.lon ?? toLL.lng, toLL.lat],
      ],
    };
    const r = await fetch(`${ORS_BASE}/${profile}/geojson`, {
      method: "POST",
      headers: { Authorization: ORS_KEY, "Content-Type": "application/json" },
      body: JSON.stringify(body),
      signal: AbortSignal.timeout(12000),
    });
    if (!r.ok) return null;
    const data = await r.json();
    const coords = data.features[0].geometry.coordinates;
    return coords.map(([lon, lat]) => [lat, lon]);
  } catch {
    return null;
  }
}

// ── STATE ─────────────────────────────────────────────────────────────────────
const S = {
  ambiciInfo:[], ambiciStatus:{}, bicingInfo:[], bicingStatus:{},
  transferPairs:[], originLL:null, destLL:null,
  routes:[], monitorTimer:null,
  mapLayers:[], activeBounds:null,
  watchId:null, userMarker:null, followUser:false, monitorPhase:0
};

// ── MAP ───────────────────────────────────────────────────────────────────────
const map = L.map("map",{zoomControl:false,attributionControl:true})
  .setView([41.40,2.18],13);
L.control.zoom({position:"bottomright"}).addTo(map);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{
  attribution:'<a href="https://carto.com/">CARTO</a>',maxZoom:19
}).addTo(map);

function mkDot(color,r=8){
  return L.divIcon({
    className:"",
    html:`<div style="width:${r*2}px;height:${r*2}px;border-radius:50%;background:${color};border:2.5px solid #fff9;box-shadow:0 2px 8px #0007"></div>`,
    iconAnchor:[r,r]
  });
}
function mkPin(color,ch="●"){
  return L.divIcon({
    className:"",
    html:`<div style="display:flex;flex-direction:column;align-items:center">
      <div style="width:32px;height:32px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${color};border:2px solid #fff;box-shadow:0 3px 10px #0008;display:flex;align-items:center;justify-content:center">
        <span style="transform:rotate(45deg);font-size:13px">${ch}</span>
      </div>
    </div>`,
    iconAnchor:[16,32]
  });
}

function mkUserDot(){
  return L.divIcon({className:"",html:'<div class="user-dot"></div>',iconAnchor:[8,8]});
}
map.on("dragstart",()=>{ S.followUser=false; });

let originMk=null, destMk=null;
map.on("click",({latlng})=>{
  if(!S.originLL){ setOrigin(latlng.lat,latlng.lng); expandPanel("half"); }
  else if(!S.destLL){ setDest(latlng.lat,latlng.lng); expandPanel("half"); }
});

// ── PANEL DRAG ────────────────────────────────────────────────────────────────
const panel=document.getElementById("panel");
const handle=document.getElementById("drag-handle");

// Returns the translateY pixel value for a given state
function stateToY(state){
  const ph=panel.offsetHeight;
  if(state==="full") return 0;
  if(state==="half") return Math.round(ph*0.44);
  return ph-80; // peek: only 80px visible
}

function expandPanel(state){
  panel.style.transform=""; // let CSS class handle it
  panel.className=state;
  panel.dataset.state=state;
}
expandPanel("half");

function togglePanel(){
  const cur=panel.dataset.state||"half";
  expandPanel(cur==="full"?"half":cur==="half"?"peek":"half");
  if(S.activeBounds && panel.dataset.state!=="full") fitVisible(S.activeBounds);
}

let drag=null, lastToggleMs=0;

function startDrag(e){
  drag={
    startY:e.touches[0].clientY,
    startT:stateToY(panel.dataset.state||"half"),
    lastY:e.touches[0].clientY,
    lastMs:Date.now(),
    vel:0, moved:false,
  };
  panel.style.transition="none";
  document.addEventListener("touchmove",moveDrag,{passive:false});
  document.addEventListener("touchend",endDrag,{once:true});
}

function moveDrag(e){
  if(!drag) return;
  const y=e.touches[0].clientY;
  const ph=panel.offsetHeight;
  const delta=y-drag.startY;
  if(Math.abs(delta)>6) drag.moved=true;
  const clamped=Math.max(0,Math.min(ph-80,drag.startT+delta));
  panel.style.transform=`translateY(${clamped}px)`;
  const now=Date.now(), dt=now-drag.lastMs;
  if(dt>16){ drag.vel=(y-drag.lastY)/dt*1000; drag.lastY=y; drag.lastMs=now; }
}

function endDrag(e){
  document.removeEventListener("touchmove",moveDrag);
  if(!drag) return;
  panel.style.transition="";
  if(!drag.moved){
    lastToggleMs=Date.now();
    togglePanel();
    drag=null; return;
  }
  const y=e.changedTouches[0].clientY;
  const ph=panel.offsetHeight;
  const curT=drag.startT+(y-drag.startY);
  const v=drag.vel;
  let target;
  if(v>400) target=curT>stateToY("half")?"peek":"half";
  else if(v<-400) target=curT<stateToY("half")?"full":"half";
  else{
    const opts=["full","half","peek"];
    let best="half",minD=Infinity;
    opts.forEach(s=>{ const d=Math.abs(curT-stateToY(s)); if(d<minD){minD=d;best=s;} });
    target=best;
  }
  expandPanel(target);
  if(S.activeBounds && target!=="full") fitVisible(S.activeBounds);
  drag=null;
}

// Drag from handle or header
handle.addEventListener("touchstart",startDrag,{passive:true});
document.getElementById("panel-header").addEventListener("touchstart",startDrag,{passive:true});

// Click for desktop / mouse users (suppress if already handled by touch)
document.getElementById("panel-header").addEventListener("click",()=>{
  if(Date.now()-lastToggleMs<300) return;
  togglePanel();
});

// ── GEOCODING ─────────────────────────────────────────────────────────────────
async function geocode(q){
  // bounded to BCN metro area: Badalona, Barcelona, L'Hospitalet, Sant Adrià
  const viewbox="1.85,41.65,2.45,41.22";
  const r=await fetch(
    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&countrycodes=es&viewbox=${viewbox}&bounded=1`,
    {headers:{"Accept-Language":"es"}});
  const d=await r.json();
  if(!d.length) throw new Error("No encontrado");
  return{lat:+d[0].lat,lng:+d[0].lon,label:d[0].display_name.split(",").slice(0,2).join(", ")};
}

["origin","dest"].forEach(k=>{
  const inp=document.getElementById(k+"-input");
  inp.addEventListener("keydown",async e=>{
    if(e.key!=="Enter") return;
    inp.blur();
    try{
      const g=await geocode(inp.value);
      if(k==="origin") setOrigin(g.lat,g.lng,g.label);
      else setDest(g.lat,g.lng,g.label);
    } catch { addAlert("No se encontró «"+inp.value+"»","danger"); }
  });
});

document.getElementById("clear-origin").addEventListener("click",()=>{
  S.originLL=null;
  document.getElementById("origin-input").value="";
  document.getElementById("clear-origin").style.display="none";
  if(originMk){map.removeLayer(originMk);originMk=null;}
  checkReady();
});
document.getElementById("clear-dest").addEventListener("click",()=>{
  S.destLL=null;
  document.getElementById("dest-input").value="";
  document.getElementById("clear-dest").style.display="none";
  if(destMk){map.removeLayer(destMk);destMk=null;}
  checkReady();
});

// GPS button
function geolocate(onSuccess){
  if(!navigator.geolocation){addAlert("GPS no disponible","warn");return;}
  setStatus("loading","Obteniendo ubicación…");
  navigator.geolocation.getCurrentPosition(
    pos=>{ setStatus("ok",statusText()); onSuccess(pos.coords); },
    ()=>addAlert("No se pudo obtener la ubicación","warn")
  );
}
document.getElementById("gps-btn").addEventListener("click",()=>{
  geolocate(c=>{ setOrigin(c.latitude,c.longitude,"Mi ubicación"); setViewVisible({lat:c.latitude,lng:c.longitude},15); });
});

// ── FLOATING MAP BUTTONS ──────────────────────────────────────────────────────
document.getElementById("mc-locate").addEventListener("click",()=>{
  if(S.monitorTimer){
    S.followUser=true;
    if(S.userLL) setViewVisible(S.userLL,16);
  } else {
    geolocate(c=>setViewVisible({lat:c.latitude,lng:c.longitude},16));
  }
});
document.getElementById("mc-route").addEventListener("click",()=>{
  if(S.activeBounds) fitVisible(S.activeBounds);
});

function checkReady(){

}
function statusText(){
  const b=S.bicingOk?`${S.bicingInfo.length} Bicing`:"Bicing ⚠";
  return `${S.ambiciInfo.length} AMBici · ${b} · ${S.transferPairs.length} transbordos`;
}

// ── MAP HELPERS ───────────────────────────────────────────────────────────────
// Fit bounds into the visible map area above the panel
function panelCoverPx(){
  const ph=panel.offsetHeight;
  const state=panel.dataset.state||"half";
  if(state==="full") return ph;
  if(state==="half") return ph*0.56;
  return 80; // peek
}
function fitVisible(bounds){
  const bottomPad=panelCoverPx()+16;
  map.fitBounds(bounds,{paddingTopLeft:[20,20],paddingBottomRight:[20,bottomPad]});
}
function setViewVisible(latlng,zoom){
  const z=zoom||map.getZoom();
  const pt=map.project(latlng,z);
  const center=map.unproject([pt.x,pt.y+panelCoverPx()/2],z);
  map.setView(center,z);
}

// ── HAVERSINE ─────────────────────────────────────────────────────────────────
function hav(la1,ln1,la2,ln2){
  const R=6371000,dL=(la2-la1)*Math.PI/180,dN=(ln2-ln1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── DATA LOADING ──────────────────────────────────────────────────────────────
async function loadBicing(){
  try{
    const d=await fetchJSON(FEEDS.bicing);
    const stations=d.network.stations;
    S.bicingInfo=stations.map(s=>({
      station_id: s.id,
      name: s.name.trim(),
      lat: s.latitude,
      lon: s.longitude,
      capacity: (s.free_bikes||0)+(s.empty_slots||0),
    }));
    S.bicingStatus={};
    stations.forEach(s=>{
      S.bicingStatus[s.id]={
        num_bikes_available: s.free_bikes||0,
        num_docks_available: s.empty_slots||0,
        num_bikes_available_types:{
          ebike:  s.extra?.ebikes||0,
          mechanical: s.extra?.normal_bikes||0,
        },
      };
    });
    S.bicingOk=true;
    return true;
  } catch(e){
    S.bicingOk=false;
    return false;
  }
}

async function loadData(){
  setStatus("loading","Cargando datos…");
  try{
    const [ai,as_]=await Promise.all([
      fetchJSON(FEEDS.ambici_info),
      fetchJSON(FEEDS.ambici_status),
    ]);
    S.ambiciInfo=ai.data.stations;
    as_.data.stations.forEach(s=>S.ambiciStatus[s.station_id]=s);
  } catch(e){
    setStatus("error","Error AMBici");
    addAlert("No se pudieron cargar datos AMBici. Comprueba la conexión.","danger");
    return;
  }

  const bicingOk=await loadBicing();
  if(!bicingOk){
    addAlert("API Bicing no disponible temporalmente — reintentando cada 30s.","warn");
  }

  computePairs();
  drawStationDots();
  setStatus(bicingOk?"ok":"loading", statusText());
  checkReady();
  setInterval(refreshStatus,30000);
}

async function refreshStatus(){
  try{
    const as_=await fetchJSON(FEEDS.ambici_status);
    as_.data.stations.forEach(s=>S.ambiciStatus[s.station_id]=s);
  } catch{}

  const wasOk=S.bicingOk;
  const nowOk=await loadBicing();
  if(!wasOk && nowOk){
    computePairs();
    drawStationDots();
    addAlert("Bicing recuperado.","ok");
    setStatus("ok",statusText());
    checkReady();
  } else if(!nowOk){
    setStatus("loading",statusText());
  } else {
    setStatus("ok",statusText());
  }

  if(S.monitorTimer) runMonitor();
}

// ── TRANSFER PAIRS ────────────────────────────────────────────────────────────
const XFER_RADIUS=300;
function computePairs(){
  S.transferPairs=[];
  for(const a of S.ambiciInfo)
    for(const b of S.bicingInfo){
      const d=hav(a.lat,a.lon,b.lat,b.lon);
      if(d<=XFER_RADIUS) S.transferPairs.push({a,b,d:Math.round(d)});
    }
  S.transferPairs.sort((x,y)=>x.d-y.d);
}

function drawStationDots(){
  S.ambiciInfo.forEach(s=>{
    const bk=bikes_a(s.station_id);
    const color=bk===0?"#FF5252":bk<=2?"#F0A040":"#1DEBA0";
    S.mapLayers.push(
      L.circleMarker([s.lat,s.lon],{
        radius:4,color:"#0a0",fillColor:color,
        fillOpacity:.85,weight:1,opacity:.9
      }).bindTooltip(`AMBici: ${s.name||"estación"} · ⚡${bk} e-bici`).addTo(map)
    );
  });
  S.bicingInfo.forEach(s=>{
    const bk=bikes_b(s.station_id);
    const eb=ebikes_b(s.station_id), mb=mech_b(s.station_id);
    const bikeStr=eb+mb>0?`⚡${eb} e-bici · 🔧${mb} normal`:`${bk} bicis`;
    const color=bk===0?"#FF5252":bk<=2?"#F0A040":"#4D9CFF";
    S.mapLayers.push(
      L.circleMarker([s.lat,s.lon],{
        radius:3,color:"#048",fillColor:color,
        fillOpacity:.8,weight:1,opacity:.9
      }).bindTooltip(`Bicing: ${s.name||"estación"} · ${bikeStr}`).addTo(map)
    );
  });
}

// ── AVAILABILITY ──────────────────────────────────────────────────────────────
const bikes_a  = id => S.ambiciStatus[id]?.num_bikes_available ?? 0;
const ebikes_a = id => bikes_a(id); // AMBici = sistema puro e-bike (vehicle_type 204)
const docks_a  = id => S.ambiciStatus[id]?.num_docks_available ?? 0;
const bikes_b  = id => {
  const s=S.bicingStatus[id]; if(!s) return 0;
  const t=s.num_bikes_available_types;
  return t ? (t.ebike||0)+(t.mechanical||0) : (s.num_bikes_available||0);
};
const ebikes_b = id => S.bicingStatus[id]?.num_bikes_available_types?.ebike ?? 0;
const mech_b   = id => S.bicingStatus[id]?.num_bikes_available_types?.mechanical ?? 0;
const docks_b  = id => S.bicingStatus[id]?.num_docks_available ?? 0;

function avail(val,cap){
  if(!cap||val===0) return 0;
  const r=val/cap;
  return r<.1?0.1:r<.25?0.45:1;
}
function risk(score){
  if(score>=.8) return{label:"OK",cls:"badge-high"};
  if(score>=.45) return{label:"Riesgo",cls:"badge-med"};
  return{label:"Crítico",cls:"badge-low"};
}
function numCls(n){return n===0?"num-bad":n<=2?"num-warn":"num-ok"}

// ── PLAN ──────────────────────────────────────────────────────────────────────
function plan(){
  const O=S.originLL, D=S.destLL;
  const origCands=S.ambiciInfo
    .map(s=>({s,d:hav(O.lat,O.lng,s.lat,s.lon)}))
    .filter(x=>x.d<=600).sort((a,b)=>a.d-b.d).slice(0,5);
  const destCands=S.bicingInfo
    .map(s=>({s,d:hav(D.lat,D.lng,s.lat,s.lon)}))
    .filter(x=>x.d<=500).sort((a,b)=>a.d-b.d).slice(0,5);

  if(!origCands.length){addAlert("Sin estaciones AMBici en 600m del origen","danger");return[];}
  if(!destCands.length){addAlert("Sin estaciones Bicing en 500m del destino","danger");return[];}

  const dOD=hav(O.lat,O.lng,D.lat,D.lng);
  const scored=[];

  for(const tp of S.transferPairs){
    const dBD=hav(tp.b.lat,tp.b.lon,D.lat,D.lng);
    // Filtro geométrico: el transbordo debe estar en la dirección correcta
    if(dBD > dOD*1.4+800) continue;

    const da=docks_a(tp.a.station_id), capA=tp.a.capacity||20;
    const bb=bikes_b(tp.b.station_id), capB=tp.b.capacity||30;

    for(const {s:OS,d:dOS} of origCands){
      const bO=bikes_a(OS.station_id), cO=OS.capacity||20;
      for(const {s:DS,d:dDS} of destCands){
        const dD=docks_b(DS.station_id), cD=DS.capacity||30;
        const rideA=hav(OS.lat,OS.lon,tp.a.lat,tp.a.lon); // tramo AMBici
        const rideB=hav(tp.b.lat,tp.b.lon,DS.lat,DS.lon); // tramo Bicing
        const totalM=(dOS+rideA+tp.d+rideB+dDS)*1.25;
        // Descartar detours: tramo en bici no debe exceder 2.5× la distancia directa
        if(rideA+rideB > dOD*2.5+800) continue;
        const av=Math.min(avail(bO,cO),avail(da,capA),avail(bb,capB),avail(dD,cD));
        const ds=Math.max(0,1-totalM/30000);
        const dw=Math.max(0,1-tp.d/XFER_RADIUS);
        // Eficiencia de ruta: penaliza desvíos respecto a la línea directa O→D
        const detour=Math.max(0,(rideA+rideB)-dOD);
        const routeEff=Math.max(0,1-detour/Math.max(dOD,1000));
        // time: walk 80m/min, cycle 220m/min, all with 1.25 road factor
        const timeMin=Math.round(((dOS+tp.d+dDS)*1.25/80)+((rideA+rideB)*1.25/220));
        scored.push({OS,TA:tp.a,TB:tp.b,DS,walkM:tp.d,totalM:Math.round(totalM),timeMin,
          segs:{dOS:Math.round(dOS),rideA:Math.round(rideA),rideB:Math.round(rideB),dDS:Math.round(dDS)},
          av:{bO,da,bb,dD},avScore:av,score:av*.40+routeEff*.38+ds*.12+dw*.10});
      }
    }
  }
  if(!scored.length){addAlert("Sin combinaciones viables. Prueba expandiendo el radio.","warn");return[];}
  scored.sort((a,b)=>b.score-a.score);
  const seen=new Set(), out=[];
  for(const r of scored){
    // Deduplicate by AMBici dropoff station — each result uses a different transfer location
    const k=r.TA.station_id;
    if(!seen.has(k)){seen.add(k);out.push(r);}
    if(out.length>=10) break;
  }
  // Drop clearly broken routes (near-zero availability) if better ones exist
  const viable=out.filter(r=>r.score>=0.2);
  return viable.length>=2 ? viable : out;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function clearMapLayers(){
  S.mapLayers.forEach(l=>map.removeLayer(l));
  S.mapLayers=[];
  drawStationDots();
}

async function drawRoute(r){
  clearMapLayers();
  const {OS,TA,TB,DS}=r;
  const O=S.originLL, D=S.destLL;

  // Fit map immediately with straight-line bounds while ORS fetches
  const fallbackPts=[
    [O.lat,O.lng],[OS.lat,OS.lon],[TA.lat,TA.lon],
    [TB.lat,TB.lon],[DS.lat,DS.lon],[D.lat,D.lng],
  ];
  const routeBounds=L.latLngBounds(fallbackPts.map(([a,b])=>L.latLng(a,b))).pad(.08);
  S.activeBounds=routeBounds;
  document.getElementById("mc-route").style.display="flex";
  fitVisible(routeBounds);

  // Fetch all 5 segments in parallel
  const [w1,c1,w2,c2,w3]=await Promise.all([
    fetchRoute("foot-walking",   {lat:O.lat,lon:O.lng},    OS),
    fetchRoute("cycling-regular",OS,                        TA),
    fetchRoute("foot-walking",   TA,                        TB),
    fetchRoute("cycling-regular",TB,                        DS),
    fetchRoute("foot-walking",   DS,                        {lat:D.lat,lon:D.lng}),
  ]);

  // Draw each segment, falling back to straight line if ORS failed
  const segs=[
    {geo:w1, fb:[fallbackPts[0],fallbackPts[1]], color:"#8899B4", dash:"5,4", w:2},
    {geo:c1, fb:[fallbackPts[1],fallbackPts[2]], color:"#1DEBA0", dash:null,  w:4},
    {geo:w2, fb:[fallbackPts[2],fallbackPts[3]], color:"#9B7FFF", dash:"3,3", w:2},
    {geo:c2, fb:[fallbackPts[3],fallbackPts[4]], color:"#4D9CFF", dash:null,  w:4},
    {geo:w3, fb:[fallbackPts[4],fallbackPts[5]], color:"#8899B4", dash:"5,4", w:2},
  ];
  segs.forEach(({geo,fb,color,dash,w})=>{
    S.mapLayers.push(L.polyline(geo||fb,{color,weight:w,dashArray:dash,opacity:.9}).addTo(map));
  });

  // Station markers
  [
    {ll:[OS.lat,OS.lon],color:"#1DEBA0",tip:`AMBici: ${bikes_a(OS.station_id)} bicis`},
    {ll:[TA.lat,TA.lon],color:"#9B7FFF",tip:`Transbordo: deja AMBici (${docks_a(TA.station_id)} anclajes)`},
    {ll:[TB.lat,TB.lon],color:"#9B7FFF",tip:`Transbordo: coge Bicing (${bikes_b(TB.station_id)} bicis)`},
    {ll:[DS.lat,DS.lon],color:"#4D9CFF",tip:`Bicing destino: ${docks_b(DS.station_id)} anclajes`},
  ].forEach(({ll,color,tip})=>{
    S.mapLayers.push(L.marker(ll,{icon:mkDot(color,9)}).bindTooltip(tip).addTo(map));
  });
}

function bikeDetail(bicingId){
  const eb=ebikes_b(bicingId), mb=mech_b(bicingId), tot=bikes_b(bicingId);
  if(eb+mb===0) return `<span class="${numCls(tot)}">${tot}</span> bicis`;
  return `<span class="${numCls(eb)}">⚡${eb}</span> · <span class="${numCls(mb)}">🔧${mb}</span>`;
}

function routeCard(r,i){
  const rk=risk(r.avScore);
  const {bO,da,bb,dD}=r.av;
  const km=(r.totalM/1000).toFixed(1);
  const walkLabel=r.walkM<10?"mismo punto":`${r.walkM} m a pie`;
  const {dOS,dDS}=r.segs;
  return `<div class="route-card${i===0?" active":""}" data-i="${i}" onclick="selectRoute(${i})">
    <div class="rc-top">
      <div class="rc-label">Opción ${i+1}</div>
      <span class="rc-badge ${rk.cls}">${rk.label}</span>
    </div>
    <div class="leg"><span class="leg-icon">🟢</span><div class="leg-text">
      <strong>${r.OS.name||"Est. AMBici"}</strong> · ${dOS}m andando<br>
      <span class="${numCls(bO)}">⚡${bO}</span> e-bici disponibles
    </div></div>
    <div class="leg"><span class="leg-icon">🔀</span><div class="leg-text">
      <strong>Transbordo</strong> · <span style="color:var(--purple)">${walkLabel}</span><br>
      Anclajes AMBici: <span class="${numCls(da)}">${da}</span> · Bicing: ${bikeDetail(r.TB.station_id)}
    </div></div>
    <div class="leg"><span class="leg-icon">🔵</span><div class="leg-text">
      <strong>${r.DS.name||"Est. Bicing"}</strong> · ${dDS}m andando<br>
      Anclajes Bicing: <span class="${numCls(dD)}">${dD}</span>
    </div></div>
    <div class="rc-footer">
      <span class="rc-dist">~${km} km</span>
      <span class="rc-time">⏱ ~${r.timeMin} min</span>
      <button class="start-btn" onclick="startMonitor(${i});event.stopPropagation()">▶ Iniciar</button>
    </div>
  </div>`;
}

function renderRoutes(routes,showAll=false){
  const box=document.getElementById("routes-box");
  if(!routes.length){ box.innerHTML=`<div class="empty"><div class="e-icon">⚠️</div><p>Sin rutas viables</p></div>`; return; }
  const visible=showAll?routes:routes.slice(0,5);
  const moreBtn=(!showAll&&routes.length>5)
    ?`<button id="more-routes-btn" onclick="renderRoutes(S.routes,true)">Ver ${routes.length-5} rutas más…</button>`
    :"";
  box.innerHTML=visible.map((r,i)=>routeCard(r,i)).join("")+moreBtn;
}

function renderAlerts(r){
  const {bO,da,bb,dD}=r.av;
  const alerts=[];
  if(bO===0) alerts.push({t:"danger",m:"Sin bicis AMBici en origen."});
  else if(bO<=2) alerts.push({t:"warn",m:`Solo ${bO} bici(s) AMBici en origen.`});
  if(da===0) alerts.push({t:"danger",m:"Sin anclajes en transbordo AMBici."});
  else if(da<=2) alerts.push({t:"warn",m:`Solo ${da} anclaje(s) en transbordo AMBici.`});
  if(bb===0) alerts.push({t:"danger",m:"Sin Bicing en el transbordo."});
  else if(bb<=2) alerts.push({t:"warn",m:`Solo ${bb} Bicing disponible(s) en transbordo.`});
  if(dD===0) alerts.push({t:"danger",m:"Sin anclajes Bicing en destino."});
  else if(dD<=2) alerts.push({t:"warn",m:`Solo ${dD} anclaje(s) en destino.`});
  if(!alerts.length) alerts.push({t:"ok",m:"Disponibilidad buena en todos los puntos. ¡Buen viaje!"});
  document.getElementById("alerts-box").innerHTML=
    alerts.map(a=>`<div class="alert al-${a.t}"><span class="al-icon">${a.t==="ok"?"✓":a.t==="warn"?"⚠":"✕"}</span><span>${a.m}</span></div>`).join("");
}

function selectRoute(i){
  S.activeRoute=i;
  document.querySelectorAll(".route-card").forEach((el,j)=>el.classList.toggle("active",j===i));
  drawRoute(S.routes[i]);
  renderAlerts(S.routes[i]);
}

// ── MONITOR ───────────────────────────────────────────────────────────────────
// ── MONITOR ───────────────────────────────────────────────────────────────────
const PHASE_LABELS=[
  "→ Ve a la estación AMBici",
  "🚴 Pedalea hasta el transbordo",
  "🚶 Camina a la estación Bicing",
  "🚴 Pedalea hasta el destino",
  "🚶 Camina hasta tu destino",
];
const ARRIVED_M=60; // metros para considerar que has llegado a un punto

function updatePhaseBar(ph){
  document.querySelectorAll(".phase-seg").forEach((el,i)=>{
    el.classList.toggle("done",i<ph);
    el.classList.toggle("active",i===ph);
  });
}

function detectPhase(lat,lng){
  const r=S.routes[S.activeRoute]; if(!r) return;
  const ph=S.monitorPhase;
  const waypoints=[
    {lat:r.OS.lat,lon:r.OS.lon},  // ph 0→1: llegaste a OS
    {lat:r.TA.lat,lon:r.TA.lon},  // ph 1→2: llegaste a TA
    {lat:r.TB.lat,lon:r.TB.lon},  // ph 2→3: llegaste a TB
    {lat:r.DS.lat,lon:r.DS.lon},  // ph 3→4: llegaste a DS
    {lat:S.destLL.lat,lon:S.destLL.lng}, // ph 4→5: llegaste al destino
  ];
  if(ph>=5) return;
  const d=hav(lat,lng,waypoints[ph].lat,waypoints[ph].lon);
  if(d<ARRIVED_M){
    const newPh=ph+1;
    S.monitorPhase=newPh;
    updatePhaseBar(newPh);
    if(newPh<=4) { logM(PHASE_LABELS[newPh]); addAlert(PHASE_LABELS[newPh],"ok"); }
    if(newPh===5){ logM("🎉 ¡Has llegado!"); stopMonitor(true); }
  }
}

function onGPSUpdate(coords){
  const {latitude:lat,longitude:lng}=coords;
  S.userLL={lat,lng};
  if(!S.userMarker){
    S.userMarker=L.marker([lat,lng],{icon:mkUserDot(),zIndexOffset:1000}).addTo(map);
  } else {
    S.userMarker.setLatLng([lat,lng]);
  }
  if(S.followUser){
    const z=map.getZoom();
    const pt=map.project([lat,lng],z);
    const center=map.unproject([pt.x,pt.y+panelCoverPx()/2],z);
    map.panTo(center,{animate:true,duration:0.8});
  }
  detectPhase(lat,lng);
}

function startMonitor(i){
  S.activeRoute=i;
  S.monitorPhase=0;
  S.followUser=true;
  document.getElementById("monitor-bar").style.display="";
  document.getElementById("monitor-log").innerHTML="";
  updatePhaseBar(0);
  logM(PHASE_LABELS[0]);
  setStatus("monitoring","En ruta");
  expandPanel("half"); // mostrar mapa + panel a la vez
  if(S.monitorTimer) clearInterval(S.monitorTimer);
  S.monitorTimer=setInterval(runMonitor,30000);
  // GPS tracking
  if(S.watchId!==null) navigator.geolocation.clearWatch(S.watchId);
  if(navigator.geolocation){
    S.watchId=navigator.geolocation.watchPosition(
      pos=>onGPSUpdate(pos.coords),
      ()=>logM("GPS no disponible — solo monitoreo de estaciones"),
      {enableHighAccuracy:true,maximumAge:5000,timeout:15000}
    );
  } else {
    logM("GPS no soportado — solo monitoreo de estaciones");
  }
}

function runMonitor(){
  const r=S.routes[S.activeRoute]; if(!r) return;
  const ph=S.monitorPhase;
  // Fase 0: aún no has cogido la bici AMBici
  if(ph===0){
    const bO=bikes_a(r.OS.station_id);
    if(bO===0){ logM("⚠ Sin bicis AMBici en origen — recalculando…"); replanOrigin(r.OS.station_id); return; }
    if(bO<=2)   logM(`⚠ Solo ${bO} bici(s) AMBici en origen`);
  }
  // Fases 0-1: aún no has dejado la bici AMBici
  if(ph<=1){
    const da=docks_a(r.TA.station_id);
    if(da===0){ logM("⚠ Sin anclajes AMBici en transbordo — recalculando…"); replanExcluding(r.TA.station_id,null); return; }
    if(da<=1)   logM(`⚠ Solo ${da} anclaje(s) AMBici en transbordo`);
  }
  // Fases 0-2: aún no has cogido la bici Bicing
  if(ph<=2){
    const bb=bikes_b(r.TB.station_id);
    if(bb===0){ logM("⚠ Sin Bicing en transbordo — recalculando…"); replanExcluding(null,r.TB.station_id); return; }
    if(bb<=1)   logM(`⚠ Solo ${bb} Bicing en transbordo`);
  }
  // Fases 0-3: aún no has dejado la bici Bicing
  if(ph<=3){
    const dD=docks_b(r.DS.station_id);
    if(dD===0){ logM("⚠ Sin anclajes Bicing en destino — recalculando destino…"); replanDest(r.DS.station_id); return; }
    if(dD<=1)   logM(`⚠ Solo ${dD} anclaje(s) Bicing en destino`);
  }
  if(ph<=4) logM(`✓ Estaciones OK · fase ${ph+1}/5`);
}

function replanOrigin(exOS){
  // Busca candidatos de origen excluyendo la estación problemática
  const saved=S.ambiciInfo;
  S.ambiciInfo=S.ambiciInfo.filter(s=>s.station_id!==exOS);
  const nr=plan(); S.ambiciInfo=saved;
  applyReplan(nr,"nueva salida en "+( nr[0]?.OS.name||"alt."));
}
function replanExcluding(exA,exB){
  const saved=S.transferPairs;
  if(exA) S.transferPairs=S.transferPairs.filter(p=>p.a.station_id!==exA);
  if(exB) S.transferPairs=S.transferPairs.filter(p=>p.b.station_id!==exB);
  const nr=plan(); S.transferPairs=saved;
  applyReplan(nr,"transbordo en "+(nr[0]?.TB.name||"alt."));
}
function replanDest(exDS){
  const saved=S.bicingInfo;
  S.bicingInfo=S.bicingInfo.filter(s=>s.station_id!==exDS);
  const nr=plan(); S.bicingInfo=saved;
  applyReplan(nr,"destino en "+(nr[0]?.DS.name||"alt."));
}
function applyReplan(nr,desc){
  if(nr.length){
    S.routes.unshift(nr[0]); S.activeRoute=0;
    renderRoutes(S.routes); selectRoute(0);
    addAlert(`Ruta recalculada: ${desc}`,"warn");
    logM(`→ Recalculada: ${desc}`);
  } else {
    addAlert("Sin alternativas. Considera el metro.","danger");
    logM("✕ Sin alternativas viables");
  }
}

function stopMonitor(arrived=false){
  clearInterval(S.monitorTimer); S.monitorTimer=null;
  if(S.watchId!==null){ navigator.geolocation.clearWatch(S.watchId); S.watchId=null; }
  if(S.userMarker){ map.removeLayer(S.userMarker); S.userMarker=null; }
  S.followUser=false; S.monitorPhase=0;
  if(!arrived) document.getElementById("monitor-bar").style.display="none";
  setStatus("ok",statusText());
  if(!arrived) logM("Monitoreo detenido");
}

document.getElementById("stop-btn").addEventListener("click",()=>stopMonitor());

function logM(msg){
  const log=document.getElementById("monitor-log");
  const t=new Date().toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  const d=document.createElement("div");
  d.className="log-line";
  d.innerHTML=`<span class="log-ts">${t}</span>${msg}`;
  log.insertBefore(d,log.firstChild);
  while(log.children.length>15) log.removeChild(log.lastChild);
}

// ── UI HELPERS ────────────────────────────────────────────────────────────────
function setStatus(type,text){
  const dot=document.getElementById("status-dot");
  dot.className=type;
  document.getElementById("status-text").textContent=text;
}
function addAlert(msg,type){
  const box=document.getElementById("alerts-box");
  const el=document.createElement("div");
  el.className=`alert al-${type}`;
  el.innerHTML=`<span class="al-icon">${type==="ok"?"✓":type==="warn"?"⚠":"✕"}</span><span>${msg}</span>`;
  box.insertBefore(el,box.firstChild);
  setTimeout(()=>el.remove(),9000);
}

// ── SERVICE WORKER ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadData();
</script>
